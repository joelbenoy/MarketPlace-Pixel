<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Marketplace - A-Frame</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.2.0/dist/aframe-extras.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        #ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 100;
            max-width: 300px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.5);
        }

        #ui-panel h3 {
            margin: 0 0 10px 0;
            color: #00ff64;
        }

        .info-text {
            margin: 5px 0;
            font-size: 12px;
        }

        #location-badge {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: #00ff64;
            padding: 10px 30px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.5);
            transition: all 0.5s;
        }

        #modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background-color: #222;
            margin: 5% auto;
            padding: 30px;
            border: 2px solid #00ff64;
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
            color: #fff;
            box-shadow: 0 0 30px rgba(0, 255, 100, 0.5);
        }

        .modal-content h2 {
            color: #00ff64;
            margin-top: 0;
        }

        .modal-content p {
            line-height: 1.6;
            margin: 10px 0;
        }

        .price-tag {
            color: #ffff00;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            background-color: #00ff64;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #00dd55;
            box-shadow: 0 0 10px rgba(0, 255, 100, 0.8);
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #fff;
        }

        #inventory {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            max-width: 250px;
            font-size: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.5);
        }

        #inventory h4 {
            margin: 0 0 10px 0;
            color: #00ff64;
        }

        .inventory-item {
            padding: 5px;
            margin: 3px 0;
            background: rgba(0, 255, 100, 0.1);
            border-left: 3px solid #00ff64;
        }

        #exit-btn {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4444;
            color: #fff;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            z-index: 100;
            cursor: pointer;
            border: 2px solid #ff6666;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        #exit-btn:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <a-scene renderer="antialias: true; colorManagement: true"
             loading-screen="dotsColor: #00ff64; backgroundColor: #000">

        <!-- Camera -->
        <a-entity id="camera-rig" position="0 2 15">
            <a-entity id="camera" camera="active: true" look-controls wasd-controls="acceleration: 30"
                      cursor="rayOrigin: mouse; fuse: false"
                      raycaster="objects: .clickable, .product, .entrance, .exit-door; far: 30">
            </a-entity>
        </a-entity>

        <!-- Sky -->
        <a-sky color="#87CEEB"></a-sky>

        <!-- Lighting -->
        <a-light type="ambient" intensity="0.5" color="#ffffff"></a-light>
        <a-light type="directional" intensity="0.8" position="-5 15 5" color="#fffbe6" shadow="cast: true"></a-light>
        <a-light type="hemisphere" intensity="0.3" color="#87CEEB" groundColor="#362"></a-light>

        <!-- ============================================================ -->
        <!-- OUTDOOR WORLD                                                -->
        <!-- ============================================================ -->
        <a-entity id="outdoor-world">

            <!-- Ground -->
            <a-plane geometry="primitive: plane; width: 200; height: 200"
                     material="color: #4a8c3f; roughness: 1"
                     rotation="-90 0 0" position="0 0 0" shadow="receive: true"></a-plane>

            <!-- ======= CENTRAL PLAZA ======= -->
            <!-- Circular plaza -->
            <a-cylinder geometry="primitive: cylinder; radius: 12; height: 0.15; segmentsRadial: 64"
                        material="color: #c8b08a; roughness: 0.9"
                        position="0 0.05 0" shadow="receive: true"></a-cylinder>
            <!-- Fountain base -->
            <a-cylinder geometry="primitive: cylinder; radius: 2.5; height: 0.8; segmentsRadial: 32"
                        material="color: #888" position="0 0.4 0"></a-cylinder>
            <!-- Fountain bowl -->
            <a-torus geometry="primitive: torus; radius: 2.5; radiusTubular: 0.3; segmentsRadial: 32"
                     material="color: #999" position="0 0.8 0"></a-torus>
            <!-- Water -->
            <a-cylinder geometry="primitive: cylinder; radius: 2.2; height: 0.1; segmentsRadial: 32"
                        material="color: #4488cc; transparent: true; opacity: 0.7"
                        position="0 0.75 0"></a-cylinder>
            <!-- Fountain pillar -->
            <a-cylinder geometry="primitive: cylinder; radius: 0.3; height: 2"
                        material="color: #aaa" position="0 1.5 0"></a-cylinder>
            <!-- Marketplace title -->
            <a-text value="PIXEL MARKETPLACE" position="0 4 0" align="center"
                    color="#1a3a1a" scale="3 3 3" side="double"></a-text>

            <!-- ======= ROADS ======= -->
            <!-- Road to Clothing (North) -->
            <a-plane geometry="primitive: plane; width: 4; height: 25"
                     material="color: #555; roughness: 0.9"
                     rotation="-90 0 0" position="0 0.06 -20"></a-plane>
            <!-- Road center line -->
            <a-plane geometry="primitive: plane; width: 0.2; height: 25"
                     material="color: #ffff00"
                     rotation="-90 0 0" position="0 0.07 -20"></a-plane>

            <!-- Road to Furniture (East) -->
            <a-plane geometry="primitive: plane; width: 4; height: 25"
                     material="color: #555; roughness: 0.9"
                     rotation="-90 90 0" position="20 0.06 0"></a-plane>
            <a-plane geometry="primitive: plane; width: 0.2; height: 25"
                     material="color: #ffff00"
                     rotation="-90 90 0" position="20 0.07 0"></a-plane>

            <!-- Road to Vehicle (South) -->
            <a-plane geometry="primitive: plane; width: 4; height: 25"
                     material="color: #555; roughness: 0.9"
                     rotation="-90 0 0" position="0 0.06 20"></a-plane>
            <a-plane geometry="primitive: plane; width: 0.2; height: 25"
                     material="color: #ffff00"
                     rotation="-90 0 0" position="0 0.07 20"></a-plane>

            <!-- Road to Miscellaneous (West) -->
            <a-plane geometry="primitive: plane; width: 4; height: 25"
                     material="color: #555; roughness: 0.9"
                     rotation="-90 90 0" position="-20 0.06 0"></a-plane>
            <a-plane geometry="primitive: plane; width: 0.2; height: 25"
                     material="color: #ffff00"
                     rotation="-90 90 0" position="-20 0.07 0"></a-plane>

            <!-- ======= CONNECTING PATHWAYS (diagonal) ======= -->
            <!-- NE path: Clothing <-> Furniture -->
            <a-plane geometry="primitive: plane; width: 2; height: 35"
                     material="color: #c8b08a; roughness: 0.9"
                     rotation="-90 45 0" position="16 0.04 -16"></a-plane>
            <!-- SE path: Furniture <-> Vehicle -->
            <a-plane geometry="primitive: plane; width: 2; height: 35"
                     material="color: #c8b08a; roughness: 0.9"
                     rotation="-90 -45 0" position="16 0.04 16"></a-plane>
            <!-- SW path: Vehicle <-> Miscellaneous -->
            <a-plane geometry="primitive: plane; width: 2; height: 35"
                     material="color: #c8b08a; roughness: 0.9"
                     rotation="-90 45 0" position="-16 0.04 16"></a-plane>
            <!-- NW path: Miscellaneous <-> Clothing -->
            <a-plane geometry="primitive: plane; width: 2; height: 35"
                     material="color: #c8b08a; roughness: 0.9"
                     rotation="-90 -45 0" position="-16 0.04 -16"></a-plane>

            <!-- ======= BUILDING 1: CLOTHING STORE (North) ======= -->
            <a-entity id="building-clothing" position="0 0 -35">
                <!-- Foundation -->
                <a-box geometry="primitive: box; width: 14; height: 0.3; depth: 12"
                       material="color: #888" position="0 0.15 0"></a-box>
                <!-- Main walls -->
                <a-box geometry="primitive: box; width: 14; height: 6; depth: 0.3"
                       material="color: #c744ff" position="0 3.15 -6"></a-box>
                <a-box geometry="primitive: box; width: 14; height: 6; depth: 0.3"
                       material="color: #c744ff" position="0 3.15 6"></a-box>
                <a-box geometry="primitive: box; width: 0.3; height: 6; depth: 12"
                       material="color: #b030e0" position="-7 3.15 0"></a-box>
                <a-box geometry="primitive: box; width: 0.3; height: 6; depth: 12"
                       material="color: #b030e0" position="7 3.15 0"></a-box>
                <!-- Roof -->
                <a-box geometry="primitive: box; width: 15; height: 0.4; depth: 13"
                       material="color: #9d2eff" position="0 6.35 0"></a-box>
                <!-- Sign -->
                <a-text value="CLOTHING STORE" position="0 5.5 6.2" align="center"
                        color="#ffffff" scale="2.5 2.5 2.5" side="double"></a-text>
                <a-text value="👗 Fashion & Apparel" position="0 4.2 6.2" align="center"
                        color="#ffff00" scale="1.2 1.2 1.2" side="double"></a-text>
                <!-- Entrance (open doorway) -->
                <a-text value="WALK IN" position="0 3.5 6.2" align="center"
                        color="#00ff64" scale="1 1 1" side="double"></a-text>
                <!-- Glow around door -->
                <a-box geometry="primitive: box; width: 3; height: 4; depth: 0.1"
                       material="color: #00ff64; transparent: true; opacity: 0.15"
                       position="0 2.2 6.3"></a-box>
                <!-- Decorative mannequin silhouettes -->
                <a-cylinder geometry="primitive: cylinder; radius: 0.3; height: 1.5"
                            material="color: #ff69b4" position="-3 1 6.3"></a-cylinder>
                <a-sphere geometry="primitive: sphere; radius: 0.25"
                          material="color: #ffdbac" position="-3 1.85 6.3"></a-sphere>
                <a-cylinder geometry="primitive: cylinder; radius: 0.3; height: 1.5"
                            material="color: #4488ff" position="3 1 6.3"></a-cylinder>
                <a-sphere geometry="primitive: sphere; radius: 0.25"
                          material="color: #ffdbac" position="3 1.85 6.3"></a-sphere>
            </a-entity>

            <!-- ======= BUILDING 2: FURNITURE STORE (East) ======= -->
            <a-entity id="building-furniture" position="35 0 0">
                <!-- Foundation -->
                <a-box geometry="primitive: box; width: 12; height: 0.3; depth: 14"
                       material="color: #888" position="0 0.15 0"></a-box>
                <!-- Main walls -->
                <a-box geometry="primitive: box; width: 12; height: 6; depth: 0.3"
                       material="color: #d4944a" position="0 3.15 -7"></a-box>
                <a-box geometry="primitive: box; width: 12; height: 6; depth: 0.3"
                       material="color: #d4944a" position="0 3.15 7"></a-box>
                <a-box geometry="primitive: box; width: 0.3; height: 6; depth: 14"
                       material="color: #c07830" position="-6 3.15 0"></a-box>
                <a-box geometry="primitive: box; width: 0.3; height: 6; depth: 14"
                       material="color: #c07830" position="6 3.15 0"></a-box>
                <!-- Roof -->
                <a-box geometry="primitive: box; width: 13; height: 0.4; depth: 15"
                       material="color: #8B4513" position="0 6.35 0"></a-box>
                <!-- Sign -->
                <a-text value="FURNITURE STORE" position="-6.2 5.5 0" align="center"
                        color="#ffffff" scale="2.5 2.5 2.5" rotation="0 90 0" side="double"></a-text>
                <a-text value="🛋️ Home & Living" position="-6.2 4.2 0" align="center"
                        color="#ffff00" scale="1.2 1.2 1.2" rotation="0 90 0" side="double"></a-text>
                <!-- Entrance (open doorway) -->
                <a-text value="WALK IN" position="-6.2 3.5 0" align="center"
                        color="#00ff64" scale="1 1 1" rotation="0 90 0" side="double"></a-text>
                <a-box geometry="primitive: box; width: 0.1; height: 4; depth: 3"
                       material="color: #00ff64; transparent: true; opacity: 0.15"
                       position="-6.3 2.2 0"></a-box>
                <!-- Decorative chair outside -->
                <a-box geometry="primitive: box; width: 1; height: 0.8; depth: 1"
                       material="color: #8B4513" position="-3 0.5 6.5"></a-box>
                <a-box geometry="primitive: box; width: 1; height: 0.6; depth: 0.2"
                       material="color: #8B4513" position="-3 1.1 6"></a-box>
            </a-entity>

            <!-- ======= BUILDING 3: VEHICLE SHOWROOM (South) ======= -->
            <a-entity id="building-vehicle" position="0 0 35">
                <!-- Foundation -->
                <a-box geometry="primitive: box; width: 16; height: 0.3; depth: 14"
                       material="color: #888" position="0 0.15 0"></a-box>
                <!-- Main walls -->
                <a-box geometry="primitive: box; width: 16; height: 6; depth: 0.3"
                       material="color: #3a3a5a" position="0 3.15 -7"></a-box>
                <a-box geometry="primitive: box; width: 16; height: 6; depth: 0.3"
                       material="color: #3a3a5a" position="0 3.15 7"></a-box>
                <a-box geometry="primitive: box; width: 0.3; height: 6; depth: 14"
                       material="color: #2a2a4a" position="-8 3.15 0"></a-box>
                <a-box geometry="primitive: box; width: 0.3; height: 6; depth: 14"
                       material="color: #2a2a4a" position="8 3.15 0"></a-box>
                <!-- Roof -->
                <a-box geometry="primitive: box; width: 17; height: 0.4; depth: 15"
                       material="color: #2a2a3a" position="0 6.35 0"></a-box>
                <!-- Sign -->
                <a-text value="VEHICLE SHOWROOM" position="0 5.5 -7.2" align="center"
                        color="#ffffff" scale="2.5 2.5 2.5" side="double"></a-text>
                <a-text value="🚗 Cars & Rides" position="0 4.2 -7.2" align="center"
                        color="#ff4444" scale="1.2 1.2 1.2" side="double"></a-text>
                <!-- Entrance (open doorway) -->
                <a-text value="WALK IN" position="0 3.5 -7.2" align="center"
                        color="#00ff64" scale="1 1 1" side="double"></a-text>
                <a-box geometry="primitive: box; width: 3.5; height: 4.5; depth: 0.1"
                       material="color: #00ff64; transparent: true; opacity: 0.15"
                       position="0 2.4 -7.3"></a-box>
            </a-entity>

            <!-- ======= BUILDING 4: MISCELLANEOUS STORE (West) ======= -->
            <a-entity id="building-misc" position="-35 0 0">
                <!-- Foundation -->
                <a-box geometry="primitive: box; width: 12; height: 0.3; depth: 14"
                       material="color: #888" position="0 0.15 0"></a-box>
                <!-- Main walls -->
                <a-box geometry="primitive: box; width: 12; height: 6; depth: 0.3"
                       material="color: #2a8a4a" position="0 3.15 -7"></a-box>
                <a-box geometry="primitive: box; width: 12; height: 6; depth: 0.3"
                       material="color: #2a8a4a" position="0 3.15 7"></a-box>
                <a-box geometry="primitive: box; width: 0.3; height: 6; depth: 14"
                       material="color: #1a7a3a" position="-6 3.15 0"></a-box>
                <a-box geometry="primitive: box; width: 0.3; height: 6; depth: 14"
                       material="color: #1a7a3a" position="6 3.15 0"></a-box>
                <!-- Roof -->
                <a-box geometry="primitive: box; width: 13; height: 0.4; depth: 15"
                       material="color: #1a6a2a" position="0 6.35 0"></a-box>
                <!-- Sign -->
                <a-text value="MISCELLANEOUS" position="6.2 5.5 0" align="center"
                        color="#ffffff" scale="2.5 2.5 2.5" rotation="0 -90 0" side="double"></a-text>
                <a-text value="🎁 Gadgets & More" position="6.2 4.2 0" align="center"
                        color="#ffff00" scale="1.2 1.2 1.2" rotation="0 -90 0" side="double"></a-text>
                <!-- Entrance (open doorway) -->
                <a-text value="WALK IN" position="6.2 3.5 0" align="center"
                        color="#00ff64" scale="1 1 1" rotation="0 -90 0" side="double"></a-text>
                <a-box geometry="primitive: box; width: 0.1; height: 4; depth: 3"
                       material="color: #00ff64; transparent: true; opacity: 0.15"
                       position="6.3 2.2 0"></a-box>
            </a-entity>

            <!-- ======= DIRECTION SIGNS ======= -->
            <!-- Sign post center -->
            <a-cylinder geometry="primitive: cylinder; radius: 0.15; height: 4"
                        material="color: #654321" position="5 2 5"></a-cylinder>
            <a-entity position="5 3.5 5">
                <a-box geometry="primitive: box; width: 3; height: 0.5; depth: 0.1"
                       material="color: #c744ff" position="0 0 0" rotation="0 0 0"></a-box>
                <a-text value="CLOTHING ↑" position="0 0 0.06" align="center" color="#fff" scale="0.9 0.9 0.9"></a-text>
            </a-entity>
            <a-entity position="5 3 5">
                <a-box geometry="primitive: box; width: 3; height: 0.5; depth: 0.1"
                       material="color: #d4944a" position="0 0 0" rotation="0 -90 0"></a-box>
                <a-text value="FURNITURE →" position="0 0 0.06" align="center" color="#fff" scale="0.9 0.9 0.9" rotation="0 -90 0"></a-text>
            </a-entity>
            <a-entity position="5 2.5 5">
                <a-box geometry="primitive: box; width: 3; height: 0.5; depth: 0.1"
                       material="color: #3a3a5a" position="0 0 0" rotation="0 180 0"></a-box>
                <a-text value="VEHICLES ↓" position="0 0 0.06" align="center" color="#fff" scale="0.9 0.9 0.9" rotation="0 180 0"></a-text>
            </a-entity>
            <a-entity position="5 2 5">
                <a-box geometry="primitive: box; width: 3; height: 0.5; depth: 0.1"
                       material="color: #2a8a4a" position="0 0 0" rotation="0 90 0"></a-box>
                <a-text value="← MISC" position="0 0 0.06" align="center" color="#fff" scale="0.9 0.9 0.9" rotation="0 90 0"></a-text>
            </a-entity>

            <!-- Street lamps -->
            <a-entity position="4 0 -12">
                <a-cylinder geometry="primitive: cylinder; radius: 0.1; height: 5" material="color: #333" position="0 2.5 0"></a-cylinder>
                <a-sphere geometry="primitive: sphere; radius: 0.4" material="color: #ffee88; emissive: #ffee44; emissiveIntensity: 0.6" position="0 5 0"></a-sphere>
                <a-light type="point" intensity="0.4" distance="15" color="#ffee88" position="0 5 0"></a-light>
            </a-entity>
            <a-entity position="-4 0 -12">
                <a-cylinder geometry="primitive: cylinder; radius: 0.1; height: 5" material="color: #333" position="0 2.5 0"></a-cylinder>
                <a-sphere geometry="primitive: sphere; radius: 0.4" material="color: #ffee88; emissive: #ffee44; emissiveIntensity: 0.6" position="0 5 0"></a-sphere>
                <a-light type="point" intensity="0.4" distance="15" color="#ffee88" position="0 5 0"></a-light>
            </a-entity>
            <a-entity position="12 0 4">
                <a-cylinder geometry="primitive: cylinder; radius: 0.1; height: 5" material="color: #333" position="0 2.5 0"></a-cylinder>
                <a-sphere geometry="primitive: sphere; radius: 0.4" material="color: #ffee88; emissive: #ffee44; emissiveIntensity: 0.6" position="0 5 0"></a-sphere>
                <a-light type="point" intensity="0.4" distance="15" color="#ffee88" position="0 5 0"></a-light>
            </a-entity>
            <a-entity position="-12 0 -4">
                <a-cylinder geometry="primitive: cylinder; radius: 0.1; height: 5" material="color: #333" position="0 2.5 0"></a-cylinder>
                <a-sphere geometry="primitive: sphere; radius: 0.4" material="color: #ffee88; emissive: #ffee44; emissiveIntensity: 0.6" position="0 5 0"></a-sphere>
                <a-light type="point" intensity="0.4" distance="15" color="#ffee88" position="0 5 0"></a-light>
            </a-entity>
            <a-entity position="4 0 12">
                <a-cylinder geometry="primitive: cylinder; radius: 0.1; height: 5" material="color: #333" position="0 2.5 0"></a-cylinder>
                <a-sphere geometry="primitive: sphere; radius: 0.4" material="color: #ffee88; emissive: #ffee44; emissiveIntensity: 0.6" position="0 5 0"></a-sphere>
                <a-light type="point" intensity="0.4" distance="15" color="#ffee88" position="0 5 0"></a-light>
            </a-entity>
            <a-entity position="-4 0 12">
                <a-cylinder geometry="primitive: cylinder; radius: 0.1; height: 5" material="color: #333" position="0 2.5 0"></a-cylinder>
                <a-sphere geometry="primitive: sphere; radius: 0.4" material="color: #ffee88; emissive: #ffee44; emissiveIntensity: 0.6" position="0 5 0"></a-sphere>
                <a-light type="point" intensity="0.4" distance="15" color="#ffee88" position="0 5 0"></a-light>
            </a-entity>

            <!-- Benches along paths -->
            <a-entity position="3 0 -6">
                <a-box geometry="primitive: box; width: 2; height: 0.6; depth: 0.6" material="color: #8B4513" position="0 0.3 0"></a-box>
                <a-box geometry="primitive: box; width: 2; height: 0.5; depth: 0.1" material="color: #8B4513" position="0 0.8 -0.25"></a-box>
            </a-entity>
            <a-entity position="-3 0 6">
                <a-box geometry="primitive: box; width: 2; height: 0.6; depth: 0.6" material="color: #8B4513" position="0 0.3 0"></a-box>
                <a-box geometry="primitive: box; width: 2; height: 0.5; depth: 0.1" material="color: #8B4513" position="0 0.8 0.25"></a-box>
            </a-entity>

            <!-- Trees -->
            <a-entity position="10 0 -10">
                <a-cylinder geometry="primitive: cylinder; radius: 0.3; height: 3" material="color: #654321" position="0 1.5 0"></a-cylinder>
                <a-sphere geometry="primitive: sphere; radius: 2" material="color: #228B22" position="0 4 0"></a-sphere>

    <!-- Location badge -->
    <div id="location-badge">Marketplace Plaza</div>

    <!-- UI Panel -->
    <div id="ui-panel">
        <h3>Pixel Marketplace</h3>
        <div class="info-text"><strong>Controls:</strong></div>
        <div class="info-text">• WASD: Move</div>
        <div class="info-text">• Mouse: Look around</div>
        <div class="info-text">• Click: Interact / Enter / Exit</div>
        <hr>
        <div class="info-text"><strong>Balance: $<span id="balance">100000</span></strong></div>
        <hr>
        <div class="info-text">Walk to a building and click the door to enter. Click EXIT to leave.</div>
    </div>

    <div id="inventory">
        <h4>Inventory</h4>
        <div id="inventory-list">
            <div class="inventory-item">Empty - Start shopping!</div>
        </div>
        <button style="width: 100%; margin-top: 10px;" onclick="sellInventory()">Sell All ($<span id="sell-price">0</span>)</button>
    </div>

    <!-- Exit building button (shown when inside) -->
    <div id="exit-btn" onclick="exitBuilding()">Exit Building</div>

    <!-- Modal -->
    <div id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Product Details</h2>
            <p id="modal-description"></p>
            <p class="price-tag" id="modal-price"></p>
            <div class="btn-group">
                <button onclick="purchaseItem()">Purchase</button>
                <button onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        /* ===== Game State ===== */
        const gameState = {
            balance: 100000,
            inventory: {},
            currentModal: null,
            currentLocation: 'outdoor' // 'outdoor' | 'clothing' | 'furniture' | 'vehicle' | 'misc'
        };

        /* ===== Building positions (indoor spawn points) ===== */
        const MARKETPLACE_CENTER = '0 2 15';
        const buildingInteriors = {
            clothing:  { interior: '0 2 -27',  id: 'interior-clothing',  entrance: { x: 0,     z: -28.9 }, exitDoor: { x: 0,   z: -25.2 } },
            furniture: { interior: '35 2 9',   id: 'interior-furniture', entrance: { x: 28.9,  z: 0     }, exitDoor: { x: 35,  z: 10.8  } },
            vehicle:   { interior: '0 2 44',   id: 'interior-vehicle',   entrance: { x: 0,     z: 27.9  }, exitDoor: { x: 0,   z: 45.8  } },
            misc:      { interior: '-35 2 8',  id: 'interior-misc',      entrance: { x: -28.9, z: 0     }, exitDoor: { x: -35, z: 9.8   } }
        };
        const ENTER_RADIUS = 4;  // how close the player must walk to auto-enter
        const EXIT_RADIUS  = 3;  // how close to exit door to auto-exit
        let transitionCooldown = 0; // prevents instant re-enter after exit

        const buildingNames = {
            outdoor:   'Marketplace Plaza',
            clothing:  'Clothing Store',
            furniture: 'Furniture Store',
            vehicle:   'Vehicle Showroom',
            misc:      'Miscellaneous Store'
        };

        /* ===== Initialization ===== */
        function init() {
            const scene = document.querySelector('a-scene');
            function setup() { addInteractions(); updateUI(); startProximityCheck(); }
            scene.addEventListener('loaded', setup);
            if (scene.hasLoaded) setup();
        }

        /* ===== Wire up click interactions ===== */
        function addInteractions() {
            // Products
            document.querySelectorAll('.product').forEach(el => {
                el.addEventListener('click', function (e) {
                    e.stopPropagation();
                    showProductModal(this);
                });
            });

            // Staff
            document.querySelectorAll('[id^="staff-"]').forEach(el => {
                el.addEventListener('click', function (e) {
                    e.stopPropagation();
                    chatWithStaff(this);
                });
            });
        }

        /* ===== Proximity-based entrance & exit detection ===== */
        function startProximityCheck() {
            const worldPos = new THREE.Vector3();
            setInterval(function () {
                // Cooldown after transitions to avoid instant re-trigger
                if (transitionCooldown > 0) { transitionCooldown--; return; }

                const cam = document.getElementById('camera');
                cam.object3D.getWorldPosition(worldPos);

                if (gameState.currentLocation === 'outdoor') {
                    // Check entrance proximity
                    for (const [name, info] of Object.entries(buildingInteriors)) {
                        const dx = worldPos.x - info.entrance.x;
                        const dz = worldPos.z - info.entrance.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        if (dist < ENTER_RADIUS) {
                            enterBuilding(name);
                            return;
                        }
                    }
                } else {
                    // Check exit door proximity
                    const info = buildingInteriors[gameState.currentLocation];
                    if (info) {
                        const dx = worldPos.x - info.exitDoor.x;
                        const dz = worldPos.z - info.exitDoor.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        if (dist < EXIT_RADIUS) {
                            exitBuilding();
                        }
                    }
                }
            }, 250); // check 4 times per second
        }

        /* ===== Enter / Exit Buildings ===== */
        function enterBuilding(name) {
            const info = buildingInteriors[name];
            if (!info) return;
            transitionCooldown = 8; // ~2 seconds cooldown (8 × 250ms)
            // Hide outdoor world, show this interior
            document.getElementById('outdoor-world').setAttribute('visible', 'false');
            document.getElementById(info.id).setAttribute('visible', 'true');
            // Reset camera local offset and look direction
            const cam = document.getElementById('camera');
            cam.setAttribute('position', '0 0 0');
            // Face into the store (-z direction = yaw 0)
            const lc = cam.components['look-controls'];
            if (lc) {
                lc.yawObject.rotation.set(0, 0, 0);
                lc.pitchObject.rotation.set(0, 0, 0);
            }
            // Move rig to spawn point (in front of exit door)
            const rig = document.getElementById('camera-rig');
            rig.setAttribute('position', info.interior);
            gameState.currentLocation = name;
            document.getElementById('location-badge').textContent = buildingNames[name];
            document.getElementById('exit-btn').style.display = 'block';
        }

        function exitBuilding() {
            if (gameState.currentLocation === 'outdoor') return;
            transitionCooldown = 8; // ~2 seconds cooldown
            const info = buildingInteriors[gameState.currentLocation];
            // Hide interior, show outdoor world
            if (info) document.getElementById(info.id).setAttribute('visible', 'false');
            document.getElementById('outdoor-world').setAttribute('visible', 'true');
            // Reset camera local offset so teleport is exact
            const cam = document.getElementById('camera');
            cam.setAttribute('position', '0 0 0');
            // Return to marketplace center
            const rig = document.getElementById('camera-rig');
            rig.setAttribute('position', MARKETPLACE_CENTER);
            gameState.currentLocation = 'outdoor';
            document.getElementById('location-badge').textContent = buildingNames.outdoor;
            document.getElementById('exit-btn').style.display = 'none';
        }

        /* ===== Product Modal ===== */
        function showProductModal(el) {
            const product = el.dataset.product;
            const price = el.dataset.price;
            const description = el.dataset.description;
            if (!product) return; // safety for nested clicks
            gameState.currentModal = { type: 'product', product, price: parseInt(price) };
            document.getElementById('modal-title').textContent = product;
            document.getElementById('modal-description').textContent = description;
            document.getElementById('modal-price').textContent = 'Price: $' + parseInt(price).toLocaleString();
            document.getElementById('modal').style.display = 'block';
        }

        function purchaseItem() {
            const modal = gameState.currentModal;
            if (!modal) return;
            if (gameState.balance < modal.price) {
                alert('Insufficient balance! You need $' + (modal.price - gameState.balance).toLocaleString() + ' more.');
                return;
            }
            gameState.balance -= modal.price;
            if (modal.type === 'product') {
                gameState.inventory[modal.product] = (gameState.inventory[modal.product] || 0) + 1;
                alert('Purchased ' + modal.product + ' for $' + modal.price.toLocaleString());
            }
            updateUI();
            closeModal();
        }

        /* ===== Staff Chat ===== */
        function chatWithStaff(el) {
            const nameEl = el.querySelector('a-text');
            if (!nameEl) return;
            const staffName = nameEl.getAttribute('value');
            const msgs = [
                'Welcome! Let me know if you need help finding anything.',
                'We have new arrivals this week — take a look around!',
                'Everything you see is in stock and ready to go.',
                'Need a recommendation? I know every item here.',
                'Great choice coming in today. Happy shopping!'
            ];
            alert(staffName + ': "' + msgs[Math.floor(Math.random() * msgs.length)] + '"');
        }

        /* ===== UI ===== */
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            gameState.currentModal = null;
        }

        function updateUI() {
            document.getElementById('balance').textContent = gameState.balance.toLocaleString();
            const list = document.getElementById('inventory-list');
            const items = Object.entries(gameState.inventory);
            if (items.length === 0) {
                list.innerHTML = '<div class="inventory-item">Empty - Start shopping!</div>';
                document.getElementById('sell-price').textContent = '0';
            } else {
                let html = '', total = 0;
                items.forEach(([item, count]) => {
                    html += '<div class="inventory-item">' + item + ' x' + count + '</div>';
                    total += count * 50; // resale value
                });
                list.innerHTML = html;
                document.getElementById('sell-price').textContent = total.toLocaleString();
            }
        }

        function sellInventory() {
            let total = 0;
            Object.values(gameState.inventory).forEach(c => { total += c * 50; });
            if (total === 0) { alert('Your inventory is empty!'); return; }
            gameState.balance += total;
            gameState.inventory = {};
            alert('Sold all items for $' + total.toLocaleString());
            updateUI();
        }

        /* ===== Misc ===== */
        window.onclick = function (e) {
            if (e.target === document.getElementById('modal')) closeModal();
        };

        window.addEventListener('load', init);
    </script>
</body>
