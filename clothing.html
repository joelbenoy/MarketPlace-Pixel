<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Store - Pixel Marketplace</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.2.0/dist/aframe-extras.min.js"></script>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <a-scene renderer="antialias: true; colorManagement: true"
             loading-screen="dotsColor: #c744ff; backgroundColor: #000">

        <!-- Camera -->
        <a-entity id="camera-rig" position="0 2 4">
            <a-entity id="camera" camera="active: true" look-controls wasd-controls="acceleration: 30"
                      cursor="rayOrigin: mouse; fuse: false"
                      raycaster="objects: .clickable, .product, .exit-door; far: 30">
            </a-entity>
        </a-entity>

        <!-- Sky -->
        <a-sky color="#e0c0e8"></a-sky>

        <!-- Lighting -->
        <a-light type="ambient" intensity="0.4" color="#ffffff"></a-light>
        <a-light type="point" intensity="0.8" distance="25" color="#fff5ee" position="0 4.5 0"></a-light>
        <a-light type="point" intensity="0.4" distance="15" color="#fff5ee" position="-5 4.5 -5"></a-light>
        <a-light type="point" intensity="0.4" distance="15" color="#fff5ee" position="5 4.5 5"></a-light>

        <!-- Floor -->
        <a-plane geometry="primitive: plane; width: 20; height: 20"
                 material="color: #e8d8c8; roughness: 0.8"
                 rotation="-90 0 0" position="0 0.01 0"></a-plane>
        <!-- Ceiling -->
        <a-plane geometry="primitive: plane; width: 20; height: 20"
                 material="color: #f5f0eb; side: double"
                 rotation="90 0 0" position="0 5 0"></a-plane>
        <!-- Walls -->
        <a-box geometry="primitive: box; width: 20; height: 5; depth: 0.3"
               material="color: #e0c0e8" position="0 2.5 -10"></a-box>
        <a-box geometry="primitive: box; width: 20; height: 5; depth: 0.3"
               material="color: #e0c0e8" position="0 2.5 10"></a-box>
        <a-box geometry="primitive: box; width: 0.3; height: 5; depth: 20"
               material="color: #d8b0e0" position="-10 2.5 0"></a-box>
        <a-box geometry="primitive: box; width: 0.3; height: 5; depth: 20"
               material="color: #d8b0e0" position="10 2.5 0"></a-box>

        <!-- Store title -->
        <a-text value="CLOTHING STORE" position="0 4 -9.8" align="center"
                color="#6a1b9a" scale="2.5 2.5 2.5"></a-text>

        <!-- Shelves & Products -->
        <!-- Shelf 1: Left wall -->
        <a-box geometry="primitive: box; width: 0.5; height: 3; depth: 6"
               material="color: #c8a882" position="-9.5 1.5 -4"></a-box>
        <!-- T-Shirt -->
        <a-assets>
            <a-asset-item id="tshirtModel" src="Assets/Clothing/tshirt.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product"
            data-product="T-Shirt"
            data-price="25"
            data-description="Comfortable cotton t-shirt available in multiple colors"
            position="-8.5 1 -6">
            
            <a-entity class="clickable"
                gltf-model="#tshirtModel"
                scale="2 2 2"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
                
            <a-text value="T-Shirt\n$25"
                position="0 1.9 0"
                align="center"
                color="#fff"
                scale="1 1 1"
                rotation="0 90 0">
            </a-text>
        </a-entity>

        <!-- Jeans -->
        <a-assets>
            <a-asset-item id="jeansModel" src="Assets/Clothing/jeans.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product"
            data-product="Jeans"
            data-price="60"
            data-description="Classic denim jeans with modern fit"
            position="-8.5 0.8 -4">

            <a-entity class="clickable"
                gltf-model="#jeansModel"
                scale="0.3 0.3 0.3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>

            <a-text value="Jeans\n$60"
                position="0 2.1 0"
                align="center"
                color="#fff"
                scale="1 1 1"
                rotation="0 90 0">
            </a-text>
        </a-entity>

        <!-- Jacket -->
        <a-assets>
            <a-asset-item id="jacketModel" src="Assets/Clothing/jacket.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product"
            data-product="Jacket"
            data-price="180"
            data-description="Premium leather jacket with zip closure"
            position="-8.5 1.2 -2">

            <a-entity class="clickable"
                gltf-model="#jacketModel"
                scale="0.1 0.1 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>

            <a-text value="Jacket\n$180"
                position="0 1.7 0"
                align="center"
                color="#fff"
                scale="1 1 1"
                rotation="0 90 0">
            </a-text>
        </a-entity>

        <!-- Shelf 2: Right wall -->
        <a-box geometry="primitive: box; width: 0.5; height: 3; depth: 6"
               material="color: #c8a882" position="9.5 1.5 -4"></a-box>
        <!-- Sneakers -->
        <a-assets>
            <a-asset-item id="sneakerModel" src="Assets/Clothing/sneakers.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product"
            data-product="Sneaker"
            data-price="120"
            data-description="Sporty sneakers with cushioned sole"
            position="8.8 1.7 -6">
                
            <a-entity class="clickable"
                gltf-model="#sneakerModel"
                scale="0.03 0.03 0.03"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
                
            <a-text value="Sneakers\n$120"
                position="0 0.9 0.05"
                align="center"
                color="#fff"
                scale="1 1 1"
                rotation="0 270 0">
            </a-text>
        </a-entity>

        <!-- Hat -->
        <a-assets>
            <a-asset-item id="hatModel" src="Assets/Clothing/hat.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product"
            data-product="Hat"
            data-price="35"
            data-description="Classic baseball cap with adjustable strap"
            position="8.8 1.7 -4">
                
            <a-entity class="clickable"
                gltf-model="#hatModel"
                scale="0.0007 0.0007 0.0007"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
                
            <a-text value="Hat\n$35"
                position="0 0.9 0"
                align="center"
                color="#fff"
                scale="1 1 1"
                rotation="0 270 0">
            </a-text>
        </a-entity>
        <!-- Dress -->
        <a-assets>
            <a-asset-item id="dressModel" src="Assets/Clothing/dress.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product"
            data-product="Dress"
            data-price="85"
            data-description="Elegant summer dress"
            position="8.8 -0.3 -2">
                
            <a-entity class="clickable" 
                id="dressModel3D"
                gltf-model="#dressModel"
                scale="1.5 1.5 1.5"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
                
            <a-text value="Dress\n$85"
                position="0 2.9 0"
                align="center"
                color="#fff"
                scale="1 1 1"
                rotation="0 270 0">
            </a-text>
        </a-entity>

        <script>
            const dress = document.querySelector('#dressModel3D'); // your dress entity id

            dress.addEventListener('model-loaded', () => {
            const model = dress.getObject3D('mesh');

                model.traverse((node) => {
                    if (node.isMesh && node.material) {
                        node.material.color.set('#ffffff');     // base color
                        node.material.emissive = new THREE.Color('#ffffff'); // glow color
                        node.material.emissiveIntensity = 1;  // glow strength

                        node.material.transparent = false; // disable transparency
                        node.material.opacity = 1;         // full opacity
                        node.material.depthWrite = true;   // proper rendering
                        node.material.needsUpdate = true;
                    }
                    
                });
            });
        </script>

        <!-- Center display tables -->
        <a-box geometry="primitive: box; width: 3; height: 0.8; depth: 2"
               material="color: #deb887" position="-3 0.4 2"></a-box>
        <!-- Scarf on table -->
        <a-assets>
            <a-asset-item id="scarfModel" src="Assets/Clothing/scarf.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product"
            data-product="Silk Scarf"
            data-price="45"
            data-description="Luxurious silk scarf with vibrant pattern"
            position="-3 -3.6 2">
                
            <a-entity class="clickable"
                gltf-model="#scarfModel"
                scale="7 7 7"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
                
            <a-text value="Scarf\n$45"
                position="0 5.7 0"
                align="center"
                color="#fff"
                scale="1 1 1"
                rotation="0 0 0">
            </a-text>
        </a-entity>

        <a-box geometry="primitive: box; width: 3; height: 0.8; depth: 2"
               material="color: #deb887" position="3 0.4 2"></a-box>
        <!-- Sunglasses on table -->
        <a-assets>
            <a-asset-item id="sunglassesModel" src="Assets/Clothing/sunglasses.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product"
            data-product="Sunglasses"
            data-price="55"
            data-description="Cool sunglasses"
            position="3 1.3 2">
                
            <a-entity class="clickable"
                gltf-model="#sunglassesModel"
                scale="0.001 0.001 0.001"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
                
            <a-text value="Sunglasses\n$55"
                position="0 0.7 0"
                align="center"
                color="#fff"
                scale="1 1 1"
                rotation="0 0 0">
            </a-text>
        </a-entity>

        <!-- Staff NPC -->
        <a-assets>
            <a-asset-item id="staff_clothingModel" src="Assets/Clothing/staff_clothing.glb"></a-asset-item>
        </a-assets>
        <a-entity
            position="2 -0.3 -3">
                
            <a-entity gltf-model="#staff_clothingModel"
                scale="12.5 12.5 12.5"
                remove-part>
            </a-entity>
                
            <a-text value="Staff: Emma"
                position="0 2.7 0"
                align="center"
                color="#fff"
                scale="1 1 1">
            </a-text>
        </a-entity>

        <!-- EXIT DOOR -->
        <a-box class="exit-door clickable" data-building="clothing"
               geometry="primitive: box; width: 2; height: 3.5; depth: 0.4"
               material="color: #cc0000; emissive: #880000; emissiveIntensity: 0.3"
               position="0 1.75 9.8">
            <a-text value="EXIT" position="0 0 0.25" align="center" color="#fff" scale="1.5 1.5 1.5"></a-text>
        </a-box>

    </a-scene>

    <script>
        AFRAME.registerComponent('remove-part', {
            init: function () {
                this.el.addEventListener('model-loaded', (e) => {
                    const model = e.detail.model;
                    model.traverse(function(node){
                        if (node.isMesh && node.material) {
                            if (node.material.name === "bandeau-bra-black") {
                                node.parent.remove(node);
                            }
                            if (node.name === "female35_02_a-base_breast") {
                                node.visible = false;
                            }
                        }
                    });
                });
            }
        });
    </script>

    <!-- Location badge -->
    <div id="location-badge">Clothing Store</div>

    <!-- UI Panel -->
    <div id="ui-panel">
        <h3>Clothing Store</h3>
        <div class="info-text"><strong>Controls:</strong></div>
        <div class="info-text">• WASD: Move</div>
        <div class="info-text">• Mouse: Look around</div>
        <div class="info-text">• Click: Interact with products</div>
        <hr>
        <div class="info-text"><strong>Balance: $<span id="balance">100000</span></strong></div>
        <hr>
        <div class="info-text">Walk to the red EXIT door to return to the marketplace.</div>
    </div>

    <div id="inventory">
        <h4>Inventory</h4>
        <div id="inventory-list">
            <div class="inventory-item">Empty - Start shopping!</div>
        </div>
        <button style="width: 100%; margin-top: 10px;" onclick="sellInventory()">Sell All ($<span id="sell-price">0</span>)</button>
    </div>

    <!-- Exit building button -->
    <div id="exit-btn" onclick="exitToMarketplace()">Exit Building</div>

    <!-- Modal -->
    <div id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Product Details</h2>
            <p id="modal-description"></p>
            <p class="price-tag" id="modal-price"></p>
            <div class="btn-group">
                <button onclick="purchaseItem()">Purchase</button>
                <button onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
</body>
</html>
