<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Store - Pixel Marketplace</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.2.0/dist/aframe-extras.min.js"></script>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <a-scene renderer="antialias: true; colorManagement: true"
             loading-screen="dotsColor: #c744ff; backgroundColor: #000">

        <!-- Camera -->
        <a-entity id="camera-rig" position="0 2 4">
            <a-entity id="camera" camera="active: true" look-controls wasd-controls="acceleration: 30"
                      cursor="rayOrigin: mouse; fuse: false"
                      raycaster="objects: .clickable, .product, .exit-door; far: 30">
            </a-entity>
        </a-entity>

        <!-- Sky -->
        <a-sky color="#e0c0e8"></a-sky>

        <!-- Lighting -->
        <a-light type="ambient" intensity="0.4" color="#ffffff"></a-light>
        <a-light type="point" intensity="0.8" distance="25" color="#fff5ee" position="0 4.5 0"></a-light>
        <a-light type="point" intensity="0.4" distance="15" color="#fff5ee" position="-5 4.5 -5"></a-light>
        <a-light type="point" intensity="0.4" distance="15" color="#fff5ee" position="5 4.5 5"></a-light>

        <!-- Floor -->
        <a-plane geometry="primitive: plane; width: 20; height: 20"
                 material="color: #e8d8c8; roughness: 0.8"
                 rotation="-90 0 0" position="0 0.01 0"></a-plane>
        <!-- Ceiling -->
        <a-plane geometry="primitive: plane; width: 20; height: 20"
                 material="color: #f5f0eb; side: double"
                 rotation="90 0 0" position="0 5 0"></a-plane>
        <!-- Walls -->
        <a-box geometry="primitive: box; width: 20; height: 5; depth: 0.3"
               material="color: #e0c0e8" position="0 2.5 -10"></a-box>
        <a-box geometry="primitive: box; width: 20; height: 5; depth: 0.3"
               material="color: #e0c0e8" position="0 2.5 10"></a-box>
        <a-box geometry="primitive: box; width: 0.3; height: 5; depth: 20"
               material="color: #d8b0e0" position="-10 2.5 0"></a-box>
        <a-box geometry="primitive: box; width: 0.3; height: 5; depth: 20"
               material="color: #d8b0e0" position="10 2.5 0"></a-box>

        <!-- Store title -->
        <a-text value="CLOTHING STORE" position="0 4 -9.8" align="center"
                color="#6a1b9a" scale="2.5 2.5 2.5"></a-text>

        <!-- Shelves & Products -->
        <!-- Shelf 1: Left wall -->
        <a-box geometry="primitive: box; width: 0.5; height: 3; depth: 6"
               material="color: #c8a882" position="-9.5 1.5 -4"></a-box>
        <!-- T-Shirt -->
        <a-assets>
            <a-asset-item id="tshirtModel" src="Assets/tshirt.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product clickable"
                data-product="T-Shirt"
                data-price="25"
                data-description="Comfortable cotton t-shirt available in multiple colors"
                gltf-model="#tshirtModel"
                position="-8.5 2 -6"
                scale="2 2 2"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
                
        <a-text value="T-Shirt\n$25"
                    position="0 1 0"
                    align="center"
                    color="#fff">
        </a-text>
        </a-entity>

        <!-- Jeans -->
        <a-assets>
            <a-asset-item id="jeansModel" src="Assets/jeans.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product clickable"
                data-product="T-Shirt"
                data-price="60"
                data-description="Classic blue denim jeans with modern fit"
                gltf-model="#jeansModel"
                position="-8.5 1.5 -4"
                scale="0.3 0.3 0.3"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
                
        <a-text value="Jeans\n$60"
                    position="0 6 0"
                    align="center"
                    color="#fff">
        </a-text>
        </a-entity>
        <!-- Jacket -->
        <a-assets>
            <a-asset-item id="jacketModel" src="Assets/jacket.glb"></a-asset-item>
        </a-assets>
        <a-entity class="product clickable"
                data-product="Jacket"
                data-price="180"
                data-description="Premium leather jacket with zip closure"
                gltf-model="#jacketModel"
                position="-8.5 2 -2"
                scale="0.1 0.1 0.1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
                
        <a-text value="Jacket\n$180"
                    position="0 0.5 0"
                    align="center"
                    color="#fff"
                    scale="1 1 1">
        </a-text>
        </a-entity>

        <!-- Shelf 2: Right wall -->
        <a-box geometry="primitive: box; width: 0.5; height: 3; depth: 6"
               material="color: #c8a882" position="9.5 1.5 -4"></a-box>
        <!-- Sneakers -->
        <a-box class="product clickable"
               data-product="Sneakers" data-price="120"
               data-description="Sporty sneakers with cushioned sole"
               geometry="primitive: box; width: 0.8; height: 0.4; depth: 0.5"
               material="color: #e74c3c" position="9 1.5 -6">
            <a-text value="Sneakers\n$120" position="0 0.3 0.3" align="center" color="#fff" scale="0.5 0.5 0.5"></a-text>
        </a-box>
        <!-- Hat -->
        <a-cylinder class="product clickable"
                    data-product="Hat" data-price="35"
                    data-description="Stylish baseball cap, one size fits all"
                    geometry="primitive: cylinder; radius: 0.4; height: 0.3"
                    material="color: #2c3e50" position="9 2.5 -4">
            <a-text value="Hat $35" position="0 0.2 0.5" align="center" color="#fff" scale="0.5 0.5 0.5"></a-text>
        </a-cylinder>
        <!-- Dress -->
        <a-cylinder class="product clickable"
                    data-product="Summer Dress" data-price="85"
                    data-description="Elegant floral summer dress"
                    geometry="primitive: cylinder; radius: 0.4; height: 1.4"
                    material="color: #f39c12" position="9 2 -2">
            <a-text value="Dress\n$85" position="0 0 0.5" align="center" color="#fff" scale="0.5 0.5 0.5"></a-text>
        </a-cylinder>

        <!-- Center display tables -->
        <a-box geometry="primitive: box; width: 3; height: 0.8; depth: 2"
               material="color: #deb887" position="-3 0.4 2"></a-box>
        <!-- Scarf on table -->
        <a-box class="product clickable"
               data-product="Silk Scarf" data-price="45"
               data-description="Luxurious silk scarf with vibrant pattern"
               geometry="primitive: box; width: 1; height: 0.1; depth: 1"
               material="color: #9b59b6" position="-3 0.9 2">
            <a-text value="Scarf $45" position="0 0.1 0" align="center" color="#fff" scale="0.5 0.5 0.5"></a-text>
        </a-box>

        <a-box geometry="primitive: box; width: 3; height: 0.8; depth: 2"
               material="color: #deb887" position="3 0.4 2"></a-box>
        <!-- Sunglasses on table -->
        <a-box class="product clickable"
               data-product="Sunglasses" data-price="55"
               data-description="UV-protected designer sunglasses"
               geometry="primitive: box; width: 0.5; height: 0.2; depth: 0.2"
               material="color: #1a1a1a" position="3 0.9 2">
            <a-text value="Shades $55" position="0 0.2 0" align="center" color="#fff" scale="0.5 0.5 0.5"></a-text>
        </a-box>

        <!-- Staff NPC -->
        <a-entity id="staff-clothing" position="4 0 -5">
            <a-box geometry="primitive: box; width: 0.6; height: 1.6; depth: 0.4" material="color: #c744ff" position="0 0.8 0"></a-box>
            <a-sphere geometry="primitive: sphere; radius: 0.3" material="color: #ffdbac" position="0 1.8 0"></a-sphere>
            <a-text value="Staff: Emma" position="0 2.3 0" align="center" color="#333" scale="0.7 0.7 0.7"></a-text>
        </a-entity>

        <!-- EXIT DOOR -->
        <a-box class="exit-door clickable" data-building="clothing"
               geometry="primitive: box; width: 2; height: 3.5; depth: 0.4"
               material="color: #cc0000; emissive: #880000; emissiveIntensity: 0.3"
               position="0 1.75 9.8">
            <a-text value="EXIT" position="0 0 0.25" align="center" color="#fff" scale="1.5 1.5 1.5"></a-text>
        </a-box>

    </a-scene>

    <!-- Location badge -->
    <div id="location-badge">Clothing Store</div>

    <!-- UI Panel -->
    <div id="ui-panel">
        <h3>Clothing Store</h3>
        <div class="info-text"><strong>Controls:</strong></div>
        <div class="info-text">• WASD: Move</div>
        <div class="info-text">• Mouse: Look around</div>
        <div class="info-text">• Click: Interact with products</div>
        <hr>
        <div class="info-text"><strong>Balance: $<span id="balance">100000</span></strong></div>
        <hr>
        <div class="info-text">Walk to the red EXIT door to return to the marketplace.</div>
    </div>

    <div id="inventory">
        <h4>Inventory</h4>
        <div id="inventory-list">
            <div class="inventory-item">Empty - Start shopping!</div>
        </div>
        <button style="width: 100%; margin-top: 10px;" onclick="sellInventory()">Sell All ($<span id="sell-price">0</span>)</button>
    </div>

    <!-- Exit building button -->
    <div id="exit-btn" onclick="exitToMarketplace()">Exit Building</div>

    <!-- Modal -->
    <div id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Product Details</h2>
            <p id="modal-description"></p>
            <p class="price-tag" id="modal-price"></p>
            <div class="btn-group">
                <button onclick="purchaseItem()">Purchase</button>
                <button onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
</body>
</html>
