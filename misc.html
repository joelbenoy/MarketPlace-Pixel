<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miscellaneous Store - Pixel Marketplace</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.2.0/dist/aframe-extras.min.js"></script>
    <link rel="stylesheet" href="shared.css">
</head>
<body>
    <a-scene renderer="antialias: true; colorManagement: true"
             loading-screen="dotsColor: #2a8a4a; backgroundColor: #000">

        <!-- Camera -->
        <a-entity id="camera-rig" position="0 2 8">
            <a-entity id="camera" camera="active: true" look-controls wasd-controls="acceleration: 30"
                      cursor="rayOrigin: mouse; fuse: false"
                      raycaster="objects: .clickable, .product, .exit-door; far: 30">
            </a-entity>
        </a-entity>

        <!-- Sky -->
        <a-sky color="#e8f5e9"></a-sky>

        <!-- Lighting -->
        <a-light type="ambient" intensity="0.4" color="#ffffff"></a-light>
        <a-light type="point" intensity="0.8" distance="25" color="#ffffff" position="0 4.5 0"></a-light>
        <a-light type="point" intensity="0.4" distance="15" color="#ffffff" position="-5 4.5 -5"></a-light>
        <a-light type="point" intensity="0.4" distance="15" color="#ffffff" position="5 4.5 5"></a-light>

        <!-- Floor -->
        <a-plane geometry="primitive: plane; width: 20; height: 20"
                 material="color: #b8d4b8; roughness: 0.8"
                 rotation="-90 0 0" position="0 0.01 0"></a-plane>
        <!-- Ceiling -->
        <a-plane geometry="primitive: plane; width: 20; height: 20"
                 material="color: #e8f5e9; side: double"
                 rotation="90 0 0" position="0 5 0"></a-plane>
        <!-- Walls -->
        <a-box geometry="primitive: box; width: 20; height: 5; depth: 0.3"
               material="color: #c8e6c9" position="0 2.5 -10"></a-box>
        <a-box geometry="primitive: box; width: 20; height: 5; depth: 0.3"
               material="color: #c8e6c9" position="0 2.5 10"></a-box>
        <a-box geometry="primitive: box; width: 0.3; height: 5; depth: 20"
               material="color: #a5d6a7" position="-10 2.5 0"></a-box>
        <a-box geometry="primitive: box; width: 0.3; height: 5; depth: 20"
               material="color: #a5d6a7" position="10 2.5 0"></a-box>

        <!-- Store title -->
        <a-text value="MISCELLANEOUS" position="0 4 -9.8" align="center"
                color="#2e7d32" scale="2.5 2.5 2.5"></a-text>

        <!-- Shelf units -->
        <a-box geometry="primitive: box; width: 6; height: 2.5; depth: 0.5"
               material="color: #aaa" position="-5 1.25 -9"></a-box>
        <a-box geometry="primitive: box; width: 6; height: 2.5; depth: 0.5"
               material="color: #aaa" position="5 1.25 -9"></a-box>

        <!-- Products -->
        <!-- Laptop -->
        <a-box class="product clickable"
               data-product="Laptop" data-price="999"
               data-description="High-performance laptop with 16GB RAM, 512GB SSD"
               geometry="primitive: box; width: 1; height: 0.08; depth: 0.7"
               material="color: #c0c0c0"
               position="-6 2 -8.5">
            <a-text value="Laptop\n$999" position="0 0.1 0" align="center" color="#333" scale="0.5 0.5 0.5"></a-text>
        </a-box>

        <!-- Smartphone -->
        <a-box class="product clickable"
               data-product="Smartphone" data-price="699"
               data-description="Latest smartphone with 6.5 inch OLED display"
               geometry="primitive: box; width: 0.3; height: 0.6; depth: 0.08"
               material="color: #1a1a2e"
               position="-4.5 2 -8.5">
            <a-text value="Phone\n$699" position="0 0.4 0.1" align="center" color="#00ff64" scale="0.4 0.4 0.4"></a-text>
        </a-box>

        <!-- Watch -->
        <a-cylinder class="product clickable"
                    data-product="Smart Watch" data-price="299"
                    data-description="Fitness tracking smartwatch with heart rate monitor"
                    geometry="primitive: cylinder; radius: 0.2; height: 0.1"
                    material="color: #333"
                    position="4 2 -8.5">
            <a-text value="Watch $299" position="0 0.1 0.3" align="center" color="#00ff64" scale="0.4 0.4 0.4"></a-text>
        </a-cylinder>

        <!-- Headphones -->
        <a-entity class="product clickable" data-product="Headphones" data-price="199"
                  data-description="Noise-cancelling wireless headphones with 30hr battery"
                  position="5.5 2 -8.5">
            <a-torus geometry="primitive: torus; radius: 0.25; radiusTubular: 0.05"
                     material="color: #1a1a1a" rotation="90 0 0"></a-torus>
            <a-text value="Headphones\n$199" position="0 0.4 0" align="center" color="#333" scale="0.4 0.4 0.4"></a-text>
        </a-entity>

        <!-- Camera -->
        <a-box class="product clickable"
               data-product="Camera" data-price="1200"
               data-description="Mirrorless digital camera with 4K video recording"
               geometry="primitive: box; width: 0.5; height: 0.4; depth: 0.4"
               material="color: #222"
               position="-3 1 -8.5">
            <a-cylinder geometry="primitive: cylinder; radius: 0.15; height: 0.2" material="color: #111" position="0.1 0 -0.3" rotation="90 0 0"></a-cylinder>
            <a-text value="Camera\n$1200" position="0 0.4 0" align="center" color="#ff4444" scale="0.4 0.4 0.4"></a-text>
        </a-box>

        <!-- Center display tables -->
        <a-box geometry="primitive: box; width: 3; height: 0.8; depth: 2"
               material="color: #bbb" position="-3 0.4 3"></a-box>
        <!-- Bluetooth Speaker -->
        <a-cylinder class="product clickable"
                    data-product="Bluetooth Speaker" data-price="79"
                    data-description="Portable waterproof bluetooth speaker"
                    geometry="primitive: cylinder; radius: 0.3; height: 0.5"
                    material="color: #2196F3"
                    position="-3 1 3">
            <a-text value="Speaker $79" position="0 0.4 0.4" align="center" color="#fff" scale="0.4 0.4 0.4"></a-text>
        </a-cylinder>

        <a-box geometry="primitive: box; width: 3; height: 0.8; depth: 2"
               material="color: #bbb" position="3 0.4 3"></a-box>
        <!-- Backpack -->
        <a-box class="product clickable"
               data-product="Backpack" data-price="65"
               data-description="Water-resistant travel backpack with laptop compartment"
               geometry="primitive: box; width: 0.5; height: 0.7; depth: 0.3"
               material="color: #4a4a4a"
               position="3 1.2 3">
            <a-text value="Backpack\n$65" position="0 0.5 0.2" align="center" color="#fff" scale="0.4 0.4 0.4"></a-text>
        </a-box>

        <!-- Board Games on a shelf -->
        <a-box geometry="primitive: box; width: 4; height: 1.5; depth: 0.5"
               material="color: #aaa" position="8 0.75 0"></a-box>
        <a-box class="product clickable"
               data-product="Board Game Set" data-price="40"
               data-description="Classic board game collection - Chess, Checkers, and more"
               geometry="primitive: box; width: 0.8; height: 0.2; depth: 0.8"
               material="color: #8B4513"
               position="8 1.6 0">
            <a-text value="Games $40" position="0 0.2 0" align="center" color="#fff" scale="0.4 0.4 0.4"></a-text>
        </a-box>

        <!-- Staff NPC -->
        <a-entity id="staff-misc" position="5 0 -4">
            <a-box geometry="primitive: box; width: 0.6; height: 1.6; depth: 0.4" material="color: #2a8a4a" position="0 0.8 0"></a-box>
            <a-sphere geometry="primitive: sphere; radius: 0.3" material="color: #ffdbac" position="0 1.8 0"></a-sphere>
            <a-text value="Staff: Lisa" position="0 2.3 0" align="center" color="#333" scale="0.7 0.7 0.7"></a-text>
        </a-entity>

        <!-- EXIT DOOR -->
        <a-box class="exit-door clickable" data-building="misc"
               geometry="primitive: box; width: 2; height: 3.5; depth: 0.4"
               material="color: #cc0000; emissive: #880000; emissiveIntensity: 0.3"
               position="0 1.75 9.8">
            <a-text value="EXIT" position="0 0 0.25" align="center" color="#fff" scale="1.5 1.5 1.5"></a-text>
        </a-box>

    </a-scene>

    <!-- Location badge -->
    <div id="location-badge">Miscellaneous Store</div>

    <!-- UI Panel -->
    <div id="ui-panel">
        <h3>Miscellaneous Store</h3>
        <div class="info-text"><strong>Controls:</strong></div>
        <div class="info-text">• WASD: Move</div>
        <div class="info-text">• Mouse: Look around</div>
        <div class="info-text">• Click: Interact with products</div>
        <hr>
        <div class="info-text"><strong>Balance: $<span id="balance">100000</span></strong></div>
        <hr>
        <div class="info-text">Walk to the red EXIT door to return to the marketplace.</div>
    </div>

    <div id="inventory">
        <h4>Inventory</h4>
        <div id="inventory-list">
            <div class="inventory-item">Empty - Start shopping!</div>
        </div>
        <button style="width: 100%; margin-top: 10px;" onclick="sellInventory()">Sell All ($<span id="sell-price">0</span>)</button>
    </div>

    <!-- Exit building button -->
    <div id="exit-btn" onclick="exitToMarketplace()">Exit Building</div>

    <!-- Modal -->
    <div id="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Product Details</h2>
            <p id="modal-description"></p>
            <p class="price-tag" id="modal-price"></p>
            <div class="btn-group">
                <button onclick="purchaseItem()">Purchase</button>
                <button onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
</body>
</html>
